<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anitwt</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0e0d;
      --bg2:     #181614;
      --bg3:     #201e1b;
      --border:  #2e2b27;
      --border2: #3d3935;
      --muted:   #6b6560;
      --text:    #ede8e1;
      --text2:   #c4bdb4;
      --accent:  #e8c97e;
      --r:       10px;
      --rs:      6px;
      --fd:      'Syne', sans-serif;
      --fb:      'Lora', serif;
      --fm:      'JetBrains Mono', monospace;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--fb); font-size: 15px;
      line-height: 1.65; -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: var(--bg); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── screens ── */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── bg grid ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: .22; pointer-events: none;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* ══════════════════ HOME ══════════════════ */
    #home { min-height: 100vh; flex-direction: column; position: relative; overflow: hidden; }

    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
      position: relative; z-index: 10;
    }
    .logo {
      font-family: var(--fd); font-weight: 800; font-size: 1.1rem;
      letter-spacing: -0.01em; color: var(--text);
      display: flex; align-items: center; gap: .5rem;
    }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
    }
    .online-pill {
      display: flex; align-items: center; gap: .4rem;
      font-family: var(--fm); font-size: .7rem; color: var(--muted);
      background: var(--bg2); border: 1px solid var(--border);
      padding: .3rem .75rem; border-radius: 99px;
    }
    .online-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #5c9e6e; box-shadow: 0 0 6px #5c9e6e;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .home-main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 3rem 1.5rem 2rem; gap: 2.5rem;
      position: relative; z-index: 10;
      max-width: 520px; margin: 0 auto; width: 100%;
    }

    .hero { text-align: center; display: flex; flex-direction: column; gap: .6rem; }
    .hero-eyebrow { font-family: var(--fm); font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); }
    .hero-title { font-family: var(--fd); font-weight: 800; font-size: clamp(2.2rem,7vw,3.2rem); line-height: 1.1; letter-spacing: -.02em; color: var(--text); }
    .hero-title em { font-style: italic; font-family: var(--fb); font-weight: 400; color: var(--accent); font-size: .9em; }
    .hero-sub { font-size: .85rem; color: var(--muted); font-style: italic; }

    .form-card {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 1.75rem;
      display: flex; flex-direction: column; gap: 1.5rem;
    }
    .form-row { display: flex; gap: 1rem; }
    .two-col > * { flex: 1; }

    .field { display: flex; flex-direction: column; gap: .5rem; }
    .field-label { font-family: var(--fm); font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
    .field-input {
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs);
      color: var(--text); font-family: var(--fb); font-size: .95rem;
      padding: .65rem .875rem; outline: none; transition: border-color .15s; width: 100%;
    }
    .field-input::placeholder { color: var(--border2); }
    .field-input:focus { border-color: var(--border2); }
    .field-hint { font-size: .68rem; color: var(--muted); font-style: italic; }

    .chip-group { display: flex; gap: .5rem; }
    .chip {
      flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs);
      color: var(--muted); font-family: var(--fm); font-size: .68rem; letter-spacing: .05em;
      padding: .55rem .5rem; cursor: pointer; transition: all .15s; text-align: center;
    }
    .chip:hover { border-color: var(--border2); color: var(--text2); }
    .chip.active { background: var(--bg); border-color: var(--accent); color: var(--accent); }

    .gender-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: .5rem; }
    .gender-btn {
      display: flex; flex-direction: column; align-items: center; gap: .3rem;
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs);
      padding: .75rem .5rem; cursor: pointer; transition: all .15s;
    }
    .gender-btn:hover { border-color: var(--border2); }
    .gender-btn.active { background: var(--bg); border-color: var(--accent); }
    .gender-btn.active .gender-icon { color: var(--accent); }
    .gender-btn.active .gender-lbl  { color: var(--text); }
    .gender-icon { font-size: 1.1rem; color: var(--muted); line-height: 1; }
    .gender-lbl  { font-family: var(--fm); font-size: .6rem; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }

    .start-btn {
      width: 100%; background: var(--accent); color: var(--bg);
      border: none; border-radius: var(--rs);
      font-family: var(--fd); font-size: 1rem; font-weight: 700; letter-spacing: .03em;
      padding: .9rem; cursor: pointer; transition: all .15s; margin-top: .25rem;
    }
    .start-btn:hover:not(:disabled) { background: #f0d48a; }
    .start-btn:disabled { opacity: .35; cursor: not-allowed; }

    .searching-state { display: flex; flex-direction: column; gap: .75rem; margin-top: .25rem; }
    .searching-bar { width: 100%; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .searching-fill { height: 100%; background: var(--accent); border-radius: 1px; animation: sweep 1.6s ease-in-out infinite; }
    @keyframes sweep { 0%{width:0%;margin-left:0%} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
    .searching-row { display: flex; align-items: center; justify-content: space-between; }
    .searching-label { font-family: var(--fm); font-size: .72rem; color: var(--muted); min-width: 10ch; }
    .cancel-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--rs);
      color: var(--muted); font-family: var(--fm); font-size: .65rem;
      padding: .3rem .75rem; cursor: pointer; transition: all .15s;
    }
    .cancel-btn:hover { border-color: var(--border2); color: var(--text2); }
    .footer-note { font-family: var(--fm); font-size: .65rem; color: var(--muted); letter-spacing: .04em; }

    /* ══════════════════ CHAT ══════════════════ */
    #chat { height: 100vh; flex-direction: column; max-width: 680px; margin: 0 auto; width: 100%; }

    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .chat-header-left { display: flex; align-items: center; gap: 1rem; }
    .chat-logo { font-family: var(--fd); font-weight: 800; font-size: .9rem; letter-spacing: -.01em; color: var(--text); }
    .chat-match { display: flex; align-items: center; gap: .5rem; }
    .match-bar-wrap { width: 64px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .match-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .6s ease; }
    .match-label { font-family: var(--fm); font-size: .65rem; color: var(--muted); }
    .end-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--rs);
      color: var(--muted); font-family: var(--fm); font-size: .65rem;
      letter-spacing: .06em; padding: .35rem .75rem; cursor: pointer; transition: all .15s;
    }
    .end-btn:hover { border-color: #8b2a2a; color: #c04444; }

    .feed { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: .75rem; }
    .feed-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem; opacity: .5; text-align: center; margin: auto; }
    .feed-empty-title { font-family: var(--fd); font-size: 1.6rem; font-weight: 800; letter-spacing: .02em; color: var(--text); }
    .feed-empty-sub { font-style: italic; font-size: .9rem; color: var(--muted); }

    .msg-row { display: flex; align-items: flex-end; gap: .5rem; }
    .msg-row.me { flex-direction: row-reverse; }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; color: var(--muted); flex-shrink: 0;
      margin-bottom: 1.4rem; font-family: var(--fm);
    }
    .bubble-col { display: flex; flex-direction: column; gap: .2rem; max-width: 70%; }
    .bubble { padding: .65rem .9rem; border-radius: 14px; font-family: var(--fb); font-size: .95rem; line-height: 1.5; word-break: break-word; }
    .bubble.stranger { background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }
    .bubble.me { background: var(--accent); color: var(--bg); border-bottom-right-radius: 4px; font-weight: 500; }
    .ts { font-family: var(--fm); font-size: .55rem; color: var(--muted); padding: 0 .2rem; }
    .msg-row.me .ts { text-align: right; }

    .typing-bubble { display: flex; align-items: center; gap: 4px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); display: inline-block; animation: typingBounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

    .disconnect-notice { font-family: var(--fm); font-size: .65rem; letter-spacing: .08em; color: var(--muted); text-align: center; padding: 1rem 0; animation: fadeIn .4s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .input-bar { display: flex; gap: .75rem; border-top: 1px solid var(--border); padding: 1rem 1.5rem; align-items: center; flex-shrink: 0; }
    .chat-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 99px;
      color: var(--text); font-family: var(--fb); font-size: .95rem;
      padding: .65rem 1.1rem; outline: none; transition: border-color .15s;
    }
    .chat-input::placeholder { color: var(--border2); font-style: italic; }
    .chat-input:focus { border-color: var(--border2); }
    .send-btn {
      background: var(--accent); color: var(--bg); border: none; border-radius: 50%;
      width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; flex-shrink: 0; transition: all .15s;
    }
    .send-btn:hover:not(:disabled) { background: #f0d48a; }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- ══════════════════ HOME SCREEN ══════════════════ -->
  <div id="home" class="screen active">
    <div class="bg-grid"></div>
    <header class="site-header">
      <div class="logo"><span class="logo-dot"></span>anitwt</div>
      <div class="online-pill">
        <span class="online-dot"></span>
        <span id="online-count">--</span> online now
      </div>
    </header>

    <main class="home-main">
      <div class="hero">
        <p class="hero-eyebrow">random anime chat · anonymous</p>
        <h1 class="hero-title">meet someone<br><em>who gets it.</em></h1>
        <p class="hero-sub">matched by anime taste, not algorithm</p>
      </div>

      <div class="form-card">
        <!-- age + language -->
        <div class="form-row two-col">
          <div class="field">
            <label class="field-label">your age</label>
            <input id="age-input" class="field-input" placeholder="e.g. 19" maxlength="2" inputmode="numeric" />
          </div>
          <div class="field">
            <label class="field-label">language</label>
            <div class="chip-group">
              <button class="chip active" data-lang="eng">🇺🇸 ENG</button>
              <button class="chip" data-lang="tag">🇵🇭 TAG</button>
            </div>
          </div>
        </div>

        <!-- anime -->
        <div class="field">
          <label class="field-label">your favorite anime</label>
          <input id="anime-input" class="field-input" placeholder="aot, jjk, one piece, vinland saga..." />
          <span class="field-hint">separate with commas — more = better matches</span>
        </div>

        <!-- you are -->
        <div class="field">
          <label class="field-label">you are</label>
          <div class="gender-grid" id="gender-group">
            <button class="gender-btn" data-value="m"><span class="gender-icon">♂</span><span class="gender-lbl">Male</span></button>
            <button class="gender-btn" data-value="f"><span class="gender-icon">♀</span><span class="gender-lbl">Female</span></button>
            <button class="gender-btn active" data-value="any"><span class="gender-icon">✦</span><span class="gender-lbl">Rather not say</span></button>
          </div>
        </div>

        <!-- looking for -->
        <div class="field">
          <label class="field-label">looking to chat with</label>
          <div class="gender-grid" id="pref-group">
            <button class="gender-btn" data-value="m"><span class="gender-icon">♂</span><span class="gender-lbl">Guys</span></button>
            <button class="gender-btn" data-value="f"><span class="gender-icon">♀</span><span class="gender-lbl">Girls</span></button>
            <button class="gender-btn active" data-value="any"><span class="gender-icon">✦</span><span class="gender-lbl">Anyone</span></button>
          </div>
        </div>

        <!-- start / searching -->
        <button id="start-btn" class="start-btn" disabled>find someone →</button>
        <div id="searching-state" class="searching-state" style="display:none;">
          <div class="searching-bar"><div class="searching-fill"></div></div>
          <div class="searching-row">
            <span class="searching-label" id="searching-label">searching</span>
            <button class="cancel-btn" id="cancel-btn">cancel</button>
          </div>
        </div>
      </div>

      <p class="footer-note">🔒 anonymous · no account · no logs</p>
    </main>
  </div>

  <!-- ══════════════════ CHAT SCREEN ══════════════════ -->
  <div id="chat" class="screen">
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="chat-logo">anitwt</span>
        <div class="chat-match">
          <div class="match-bar-wrap">
            <div class="match-bar-fill" id="match-bar-fill"></div>
          </div>
          <span class="match-label" id="match-label">0% anime match</span>
        </div>
      </div>
      <button class="end-btn" id="end-btn">end chat ×</button>
    </div>

    <div class="feed" id="feed">
      <div class="feed-empty" id="feed-empty">
        <span class="feed-empty-title">Connected ✦</span>
        <span class="feed-empty-sub" id="feed-empty-sub">Break the ice!</span>
      </div>
    </div>

    <div class="input-bar">
      <input class="chat-input" id="chat-input" placeholder="say something about anime..." />
      <button class="send-btn" id="send-btn" disabled>↑</button>
    </div>
  </div>

  <script>
    // ─── 🔴 CHANGE THIS to your server URL after deploying ───────────────────
    const SERVER_URL = "http://localhost:5000";
    // ─────────────────────────────────────────────────────────────────────────

    const socket = io(SERVER_URL);

    // state
    let language     = "eng";
    let gender       = "any";
    let pref         = "any";
    let typingTimer  = null;
    let dotsInterval = null;
    let dotsCount    = 0;
    let typingEl     = null;
    let isDisconnected = false;

    // online count (cosmetic)
    document.getElementById("online-count").textContent =
      Math.floor(Math.random() * 80) + 20;

    // ── helpers ──
    function now() {
      const d = new Date();
      return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function validateStart() {
      const age   = document.getElementById("age-input").value.trim();
      const anime = document.getElementById("anime-input").value.trim();
      document.getElementById("start-btn").disabled = !age || !anime;
    }

    // ── language chips ──
    document.querySelectorAll(".chip[data-lang]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".chip[data-lang]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        language = btn.dataset.lang;
      });
    });

    // ── gender / pref buttons ──
    function setupToggleGroup(groupId, onChange) {
      document.querySelectorAll(`#${groupId} .gender-btn`).forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(`#${groupId} .gender-btn`).forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          onChange(btn.dataset.value);
        });
      });
    }
    setupToggleGroup("gender-group", v => gender = v);
    setupToggleGroup("pref-group",   v => pref   = v);

    // ── form validation ──
    document.getElementById("age-input").addEventListener("input", e => {
      e.target.value = e.target.value.replace(/\D/g, "");
      validateStart();
    });
    document.getElementById("anime-input").addEventListener("input", validateStart);

    // ── start ──
    document.getElementById("start-btn").addEventListener("click", () => {
      const age   = document.getElementById("age-input").value.trim();
      const anime = document.getElementById("anime-input").value.trim();
      if (!age || !anime) return;

      document.getElementById("start-btn").style.display = "none";
      document.getElementById("searching-state").style.display = "flex";

      dotsCount = 0;
      dotsInterval = setInterval(() => {
        dotsCount = (dotsCount + 1) % 4;
        document.getElementById("searching-label").textContent = "searching" + ".".repeat(dotsCount);
      }, 450);

      socket.emit("start", {
        interests: anime.toLowerCase().split(",").map(s => s.trim()).filter(Boolean),
        age: Number(age),
        language, gender, pref,
      });
    });

    // ── cancel ──
    document.getElementById("cancel-btn").addEventListener("click", () => {
      socket.emit("cancel");
      clearInterval(dotsInterval);
      document.getElementById("start-btn").style.display = "block";
      document.getElementById("searching-state").style.display = "none";
    });

    // ── matched ──
    socket.on("matched", (data) => {
      clearInterval(dotsInterval);
      isDisconnected = false;
      const pct = data.percent ?? 0;

      document.getElementById("match-bar-fill").style.width = pct + "%";
      document.getElementById("match-label").textContent = pct + "% anime match";
      document.getElementById("feed-empty-sub").textContent =
        "You share " + pct + "% anime taste — break the ice!";

      // reset feed
      const feed = document.getElementById("feed");
      feed.innerHTML = "";
      const empty = document.createElement("div");
      empty.className = "feed-empty"; empty.id = "feed-empty";
      empty.innerHTML = `<span class="feed-empty-title">Connected ✦</span>
        <span class="feed-empty-sub">You share ${pct}% anime taste — break the ice!</span>`;
      feed.appendChild(empty);

      typingEl = null;
      document.getElementById("chat-input").disabled = false;
      document.getElementById("send-btn").disabled   = true;
      document.getElementById("chat-input").value    = "";

      showScreen("chat");
    });

    // ── receive message ──
    socket.on("message", msg => addMessage(msg, "stranger"));

    // ── typing indicator ──
    socket.on("typing", () => {
      showTyping();
      clearTimeout(typingTimer);
      typingTimer = setTimeout(hideTyping, 1400);
    });

    // ── partner disconnected ──
    socket.on("end", () => {
      isDisconnected = true;
      document.getElementById("chat-input").disabled = true;
      document.getElementById("send-btn").disabled   = true;
      hideTyping();
      const notice = document.createElement("div");
      notice.className = "disconnect-notice";
      notice.textContent = "— stranger disconnected — returning to home —";
      document.getElementById("feed").appendChild(notice);
      document.getElementById("feed").scrollTop = 99999;
      setTimeout(goHome, 3000);
    });

    // ── send ──
    function sendMessage() {
      const input = document.getElementById("chat-input");
      const text  = input.value.trim();
      if (!text || isDisconnected) return;
      addMessage(text, "me");
      socket.emit("message", text);
      socket.emit("typing");
      input.value = "";
      document.getElementById("send-btn").disabled = true;
    }

    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("chat-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById("chat-input").addEventListener("input", e => {
      document.getElementById("send-btn").disabled = !e.target.value.trim() || isDisconnected;
    });

    // ── end chat button ──
    document.getElementById("end-btn").addEventListener("click", () => {
      socket.emit("end");
      goHome();
    });

    // ── go home ──
    function goHome() {
      isDisconnected = false;
      clearInterval(dotsInterval);
      document.getElementById("start-btn").style.display = "block";
      document.getElementById("searching-state").style.display = "none";
      validateStart();
      showScreen("home");
    }

    // ── add message ──
    function addMessage(text, sender) {
      const feed  = document.getElementById("feed");
      const empty = document.getElementById("feed-empty");
      if (empty) empty.remove();
      hideTyping();

      const row = document.createElement("div");
      row.className = "msg-row" + (sender === "me" ? " me" : "");

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = sender === "me" ? "me" : "?";

      const col = document.createElement("div");
      col.className = "bubble-col";

      const bubble = document.createElement("div");
      bubble.className = "bubble " + sender;
      bubble.textContent = text;

      const ts = document.createElement("span");
      ts.className = "ts";
      ts.textContent = now();

      col.appendChild(bubble);
      col.appendChild(ts);
      row.appendChild(avatar);
      row.appendChild(col);
      feed.appendChild(row);
      feed.scrollTop = feed.scrollHeight;
    }

    // ── typing indicator ──
    function showTyping() {
      if (typingEl) return;
      const feed  = document.getElementById("feed");
      const empty = document.getElementById("feed-empty");
      if (empty) empty.remove();

      typingEl = document.createElement("div");
      typingEl.className = "msg-row";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "?";

      const bubble = document.createElement("div");
      bubble.className = "bubble stranger typing-bubble";
      bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

      typingEl.appendChild(avatar);
      typingEl.appendChild(bubble);
      feed.appendChild(typingEl);
      feed.scrollTop = feed.scrollHeight;
    }

    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }
  </script>
</body>
</html>
